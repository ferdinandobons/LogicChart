<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 128" role="img" aria-labelledby="title desc">
  <title id="title">CodeDebrief</title>
  <desc id="desc">CodeDebrief logo with icon and wordmark.</desc>
  <style>
    .wordmark {
      fill: #edf2fb;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 72px;
      font-weight: 780;
      letter-spacing: -1px;
      paint-order: stroke fill;
      stroke: #020817;
      stroke-linejoin: round;
      stroke-width: 4px;
    }
  </style>
  <g aria-hidden="true" transform="translate(34 18)">
